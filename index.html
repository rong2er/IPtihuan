<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>优选 IP/域名 批量替换与去重工具</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 1200px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background: #fff;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .panel {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            background: #fafafa;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        label {
            display: block;
            margin: 10px 0 5px;
            font-weight: bold;
            color: #34495e;
        }
        input[type="text"], textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
        }
        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }
        button {
            padding: 12px;
            margin-top: 15px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .btn-success {
            background-color: #2ecc71;
        }
        .btn-success:hover {
            background-color: #27ae60;
        }
        .btn-warning {
            background-color: #f39c12;
        }
        .btn-warning:hover {
            background-color: #d68910;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: auto; /* Push buttons to the bottom */
        }
        .btn-group button {
            flex: 1;
            margin-top: 15px;
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 13px;
            color: #888;
        }
        /* 响应式：屏幕较小时垂直排列 */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <h2>节点 IP/域名 批量替换与处理工具</h2>

    <div class="container">
        <div class="panel">
            <h3 style="margin-top:0; color:#2c3e50;">1. 数据输入</h3>
            <label for="baseLink">🔗 原始节点链接:</label>
            <input type="text" id="baseLink" placeholder="请粘贴完整的原始节点链接 (例如 vless://...)">

            <label for="ipList">📝 优选 IP 或 域名 (每行一个):</label>
            <textarea id="ipList" rows="12" placeholder="请粘贴需要替换进去的 IP 或域名列表，每行一个..."></textarea>

            <button onclick="generateLinks()">⚡ 一键批量替换生成 ➡️</button>
        </div>

        <div class="panel">
            <h3 style="margin-top:0; color:#2c3e50;">2. 结果处理</h3>
            <label for="output">✅ 生成结果 / 待处理文本:</label>
            <textarea id="output" rows="14" placeholder="这里会显示生成的节点。你也可以直接在这里粘贴文本进行去重处理..."></textarea>

            <div class="btn-group">
                <button class="btn-success" id="copyBtn" onclick="copyResult()">📋 一键复制结果</button>
                <button class="btn-warning" onclick="deduplicate()">🧹 文本去重</button>
            </div>
        </div>
    </div>

    <div class="footer">支持标准分享链接批量替换（精准识别 @ 到 :端口 号之间的部分） | 结果框支持手动输入并去重</div>

    <script>
        // 批量替换生成功能
        function generateLinks() {
            const baseLink = document.getElementById('baseLink').value.trim();
            const ipText = document.getElementById('ipList').value.trim();
            const outputField = document.getElementById('output');

            if (!baseLink || !ipText) {
                alert('请确保左侧已填入原始节点链接和 IP/域名列表！');
                return;
            }

            const ipList = ipText.split('\n').map(item => item.trim()).filter(item => item !== '');
            const regex = /(.+?@)([^:]+)(:\d+.*)/;

            if (!regex.test(baseLink)) {
                alert('原始节点格式无法识别！请确保链接中包含 "@" 以及 ":" 后跟端口号 (例如 :443)。');
                return;
            }

            const results = ipList.map(ip => {
                return baseLink.replace(regex, `$1${ip}$3`);
            });

            // 如果右侧框内已有内容，选择追加还是覆盖（这里设定为覆盖，符合多数习惯）
            outputField.value = results.join('\n');
            
            // 自动去重一次（可选，防止输入的IP列表自带重复项）
            deduplicate(true);
        }

        // 去重功能
        function deduplicate(isSilent = false) {
            const outputField = document.getElementById('output');
            const text = outputField.value;

            if (!text.trim()) {
                if (!isSilent) alert('结果框内没有内容，无法去重。');
                return;
            }

            // 按行分割，去除首尾空格，过滤空行
            const lines = text.split('\n').map(line => line.trim()).filter(line => line !== '');
            const originalLength = lines.length;
            
            // 使用 Set 进行去重
            const uniqueLines = [...new Set(lines)];
            const uniqueLength = uniqueLines.length;

            // 回写去重后的结果
            outputField.value = uniqueLines.join('\n');

            // 提示清理结果
            if (!isSilent) {
                const removedCount = originalLength - uniqueLength;
                if (removedCount > 0) {
                    alert(`✅ 去重完成！共清理了 ${removedCount} 条重复记录，剩余 ${uniqueLength} 条。`);
                } else {
                    alert('✅ 当前内容无重复项。');
                }
            }
        }

        // 一键复制功能
        function copyResult() {
            const outputField = document.getElementById('output');
            const copyBtn = document.getElementById('copyBtn');
            
            if (!outputField.value.trim()) {
                alert('没有内容可以复制！');
                return;
            }

            outputField.select();
            outputField.setSelectionRange(0, 99999); // 兼容移动端

            navigator.clipboard.writeText(outputField.value).then(() => {
                const originalText = copyBtn.innerText;
                copyBtn.innerText = '✔️ 复制成功！';
                copyBtn.style.backgroundColor = '#27ae60';
                
                setTimeout(() => {
                    copyBtn.innerText = originalText;
                    copyBtn.style.backgroundColor = ''; // 恢复默认颜色
                }, 2000);
            }).catch(err => {
                alert('复制失败，请手动全选复制。');
            });
        }
    </script>
</body>
</html>
