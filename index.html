<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>优选 IP/域名 批量处理工具</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            max-width: 1300px;
            margin: 20px auto;
            padding: 20px;
        }
        .main-title {
            text-align: center;
            color: #1a73e8;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 600;
        }
        .section-box {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 30px;
            padding: 25px;
            border: 1px solid #e1e4e8;
        }
        .section-title {
            font-size: 20px;
            color: #202124;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f1f3f4;
        }
        .section-basic { border-left: 6px solid #3498db; }
        .section-advanced { border-left: 6px solid #e67e22; }

        .container {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }
        .panel {
            flex: 1;
            min-width: 350px;
            display: flex;
            flex-direction: column;
        }
        label {
            display: block;
            margin: 12px 0 6px;
            font-weight: 600;
            color: #5f6368;
            font-size: 14px;
        }
        input[type="text"], textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            transition: all 0.2s;
        }
        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #1a73e8;
            box-shadow: 0 0 0 2px rgba(26,115,232,0.1);
        }
        button {
            padding: 12px 20px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 15px;
        }
        button:active { transform: scale(0.98); }
        button:hover { background-color: #1765cc; }

        .btn-success { background-color: #34a853; }
        .btn-success:hover { background-color: #2d8e47; }
        .btn-warning { background-color: #fbbc04; color: #3c4043; }
        .btn-warning:hover { background-color: #f1b000; }
        .btn-orange { background-color: #e67e22; }
        .btn-orange:hover { background-color: #d35400; }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }
        .btn-group button {
            flex: 1;
            margin-top: 0;
        }
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 13px;
            color: #70757a;
        }
        @media (max-width: 900px) {
            .container { flex-direction: column; }
            .panel { min-width: 100%; }
        }
        
        .config-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin: 15px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px dashed #dee2e6;
            align-items: flex-start;
        }
        .config-item {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 180px;
        }
        .config-item label {
            margin: 0 0 5px 0;
            color: #495057;
        }
        .region-group {
            margin-top: 12px;
            padding: 18px;
            background: #fff;
            border: 1px solid #e1e4e8;
            border-radius: 8px;
        }
        .region-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #eee;
        }
        .region-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }
        .region-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
        }
        .region-item input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 500 !important;
            margin: 0 !important;
            cursor: pointer;
            color: #333;
        }
        .btn-mini {
            padding: 5px 12px;
            font-size: 12px;
            margin-top: 0;
            background-color: #6c757d;
            border-radius: 4px;
        }
        .inline-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }
        .inline-checkbox input {
            width: 18px;
            height: 18px;
        }
        .alert-info {
            background-color: #fff8e1;
            color: #856404;
            border: 1px solid #ffe082;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            line-height: 1.6;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .alert-info b {
            color: #d84315;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <h1 class="main-title">优选 IP/域名 批量处理工具</h1>

    <!-- 基础替换部分 -->
    <div class="section-box section-basic">
        <div class="section-title">📦 基础替换模式 (保留原始参数)</div>
        <div class="container">
            <div class="panel">
                <label for="baseLink">🔗 原始节点分享链接:</label>
                <input type="text" id="baseLink" placeholder="粘贴原始链接，例如 vless://...">
                
                <label for="ipList">📝 优选地址列表 (每行一个 IP 或域名):</label>
                <textarea id="ipList" rows="10" placeholder="粘贴需要替换进去的 IP 或域名..."></textarea>
                
                <button onclick="generateLinks()">⚡ 开始基础生成 (仅替换地址) ➡️</button>
            </div>
            
            <div class="panel">
                <label for="output">✅ 基础生成结果:</label>
                <textarea id="output" rows="14" placeholder="结果将显示在此..."></textarea>
                
                <div class="btn-group">
                    <button class="btn-success" id="copyBtn" onclick="copyResult('output', 'copyBtn')">📋 复制结果</button>
                    <button class="btn-warning" onclick="deduplicate('output')">🧹 文本去重</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 高级生成部分 -->
    <div class="section-box section-advanced">
        <div class="section-title">🚀 高级优选模式 <small style="color:#34a853; font-size:12px;">(V7-Final-完整修复版)</small></div>
        <div class="container">
            <div class="panel">
                <label for="advBaseLink">🔗 原始节点链接 (推荐包含 TLS 配置):</label>
                <input type="text" id="advBaseLink" placeholder="粘贴原始链接，生成器会保留 SNI 等原有参数...">
                
                <label for="advIpList">📝 优选地址列表 (每行一个 IP 或域名):</label>
                <textarea id="advIpList" rows="8" placeholder="粘贴杂乱 IP 列表，点击下方按钮解析..."></textarea>
                
                <div class="btn-group" style="margin-bottom: 10px;">
                    <button class="btn-warning" onclick="cleanAdvIpList()">🧹 解析并去重 IP 列表</button>
                </div>

                <div class="alert-info">
                    <div>
                        <b>📢 配置说明：</b> 设置 ProxyIP 后将忽略地区匹配。支持 SOCKS5 转发及移除海外清理参数。
                    </div>
                </div>

                <div class="config-grid">
                    <div class="config-item" style="flex: 0 0 100px;">
                        <label for="advEd">ED端口:</label>
                        <input type="text" id="advEd" value="2048">
                    </div>
                    <div class="config-item" style="flex: 1;">
                        <label for="advProxyIP">指定 ProxyIP:</label>
                        <input type="text" id="advProxyIP" placeholder="1.1.1.1">
                    </div>
                    <div class="config-item" style="flex: 2;">
                        <label for="advCustomName">自定义名称:</label>
                        <div style="display: flex; gap: 5px;">
                            <select id="advFlag" style="padding: 10px 5px; border-radius: 8px; border: 1px solid #dadce0;">
                                <option value="🌐">🌐 默认</option>
                                <option value="🇭🇰">🇭🇰 香港</option><option value="🇺🇸">🇺🇸 美国</option>
                                <option value="🇸🇬">🇸🇬 新加坡</option><option value="🇰🇷">🇰🇷 韩国</option>
                                <option value="🇯🇵">🇯🇵 日本</option><option value="🇩🇪">🇩🇪 德国</option>
                            </select>
                            <input type="text" id="advCustomName" placeholder="默认: 优选节点" style="flex: 1;">
                        </div>
                    </div>
                    <div class="config-item" style="flex: 1.5;">
                        <label for="advSocks5">SOCKS5:</label>
                        <input type="text" id="advSocks5" placeholder="user:pass@host:port">
                    </div>
                    <div class="config-item" style="flex: 0 0 160px; justify-content: center;">
                        <div class="inline-checkbox">
                            <input type="checkbox" id="advRm">
                            <label for="advRm" class="checkbox-label">移除清理 (rm=no)</label>
                        </div>
                    </div>
                </div>

                <!-- 地区勾选 -->
                <div class="region-group">
                    <div class="region-header">
                        <label style="margin:0; font-weight:600;">🌍 选择生成的地区 (wk):</label>
                        <div style="display:flex; gap:5px;">
                            <button class="btn-mini" onclick="toggleAllRegions(true)">全选</button>
                            <button class="btn-mini" onclick="toggleAllRegions(false)">清空</button>
                        </div>
                    </div>
                    <div id="regionList" class="region-list">
                        <!-- 脚本动态生成 -->
                    </div>
                </div>
                
                <button class="btn-orange" onclick="generateAdvancedLinks()">🔥 批量生成高级优选节点 ➡️</button>
            </div>
            
            <div class="panel">
                <label for="advOutput">✅ 高级生成结果:</label>
                <textarea id="advOutput" rows="22" placeholder="生成的带参数结果..."></textarea>
                
                <div class="btn-group">
                    <button class="btn-success" id="copyAdvBtn" onclick="copyResult('advOutput', 'copyAdvBtn')">📋 复制高级结果</button>
                    <button class="btn-warning" onclick="deduplicate('advOutput')">🧹 结果去重</button>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        支持协议解析与参数智能合并。© 2026 优选 IP 批量处理工具。
    </div>

    <script>
        const regionMap = {
            'HK': '🇭🇰香港', 'US': '🇺🇸美国', 'SG': '🇸🇬新加坡', 'KR': '🇰🇷韩国', 'JP': '🇯🇵日本',
            'DE': '🇩🇪德国', 'SE': '🇸🇪瑞典', 'NL': '🇳🇱荷兰', 'FI': '🇫🇮芬兰', 'GB': '🇬🇧英国'
        };

        function initRegions() {
            const container = document.getElementById('regionList');
            if (!container) return;
            container.innerHTML = ''; 
            Object.keys(regionMap).forEach(code => {
                const div = document.createElement('div');
                div.className = 'region-item';
                const isChecked = (code === 'HK') ? 'checked' : '';
                div.innerHTML = `<input type="checkbox" id="reg_${code}" value="${code}" ${isChecked}><label for="reg_${code}" class="checkbox-label">${regionMap[code]}</label>`;
                container.appendChild(div);
            });
        }

        function toggleAllRegions(selected) {
            document.querySelectorAll('#regionList input[type="checkbox"]').forEach(cb => cb.checked = selected);
        }

        window.onload = initRegions;

        function generateLinks() {
            const baseLink = document.getElementById('baseLink').value.trim();
            const outputField = document.getElementById('output');
            if (!baseLink) { alert('请填写基础链接'); return; }
            
            // 使用改进的解析逻辑处理输入列表
            const ipItems = parseAndCleanIpList('ipList');
            if (ipItems.length === 0) { alert('优选地址列表为空或未识别到有效地址'); return; }

            const regex = /^([^:]+:\/\/)([^@]+@)(\[[^\]]+\]|[^:?#\/]+)(.*)$/;
            if (!regex.test(baseLink)) { alert('链接格式不正确'); return; }
            const match = baseLink.match(regex);
            const prefix = match[1] + match[2], suffix = match[4];
            
            outputField.value = ipItems.map(item => {
                return `${prefix}${item.host}${suffix}`;
            }).join('\n');
            deduplicate('output', true);
        }

        function parseAndCleanIpList(id) {
            const textArea = document.getElementById(id);
            const text = textArea.value.trim();
            if (!text) return [];

            // 1. 定义匹配规则
            // IPv4: 4段数字，每段最多3位
            const ipv4Pattern = /(?:\d{1,3}\.){3}\d{1,3}/;
            // IPv6: [....] 格式
            const ipv6Pattern = /\[[a-fA-F0-9:]+\]/;
            // 域名: 至少包含一个点，后缀必须是字母且长度>=2
            const domainPattern = /(?:[a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}/;
            
            // 组合正则: (IPv4|IPv6|域名)(:端口)?
            // 使用全局匹配 g
            const fullReg = new RegExp(`(?:(${ipv4Pattern.source})|(${ipv6Pattern.source})|(${domainPattern.source}))(?::(\\d+))?`, 'g');
            
            const set = new Set(), ipList = [];
            let match;
            
            // 2. 全局搜索匹配项
            while ((match = fullReg.exec(text)) !== null) {
                let host = match[1] || match[2] || match[3];
                let port = match[4] || "443";
                
                if (!host) continue;

                // 3. 过滤干扰项
                // 排除包含速度、延迟单位的干扰 (如 82.91MB, 59.71ms)
                // 即使它们符合域名正则的一部分，也应该根据上下文剔除
                const lowerHost = host.toLowerCase();
                if (lowerHost.includes('mb') || lowerHost.includes('ms') || lowerHost.includes('kb') || lowerHost.includes('gb')) {
                    continue;
                }

                // 校验 IPv4 合法性 (0-255)
                if (match[1]) {
                    const parts = host.split('.');
                    if (parts.some(p => parseInt(p) > 255)) continue;
                }

                // 处理 IPv6 括号
                if (host.includes(':') && !host.startsWith('[')) host = `[${host}]`;
                
                const key = `${host}:${port}`;
                if (!set.has(key)) {
                    set.add(key);
                    ipList.push({
                        host: host, 
                        port: ':' + port, 
                        display: host.replace(/[\[\]]/g, '') + ':' + port
                    });
                }
            }
            
            // 4. 写回文本框（去重并格式化后的列表）
            if (ipList.length > 0) {
                textArea.value = ipList.map(i => i.display).join('\n');
            }
            return ipList;
        }

        function cleanAdvIpList() {
            const list = parseAndCleanIpList('advIpList');
            if (list.length > 0) alert(`✅ 顺利提取 ${list.length} 个 IP`);
            else alert('⚠️ 未识别到有效内容');
        }

        function generateAdvancedLinks() {
            const baseLink = document.getElementById('advBaseLink').value.trim();
            const ipList = parseAndCleanIpList('advIpList');
            const output = document.getElementById('advOutput');
            const params = {
                ed: document.getElementById('advEd').value.trim() || '2048',
                p: document.getElementById('advProxyIP').value.trim().replace(/\/+$/, ''),
                name: document.getElementById('advCustomName').value.trim() || '优选节点',
                flag: document.getElementById('advFlag').value,
                s: document.getElementById('advSocks5').value.trim().replace(/\/+$/, ''),
                rm: document.getElementById('advRm').checked
            };

            if (!baseLink || ipList.length === 0) { alert('参数不全！'); return; }
            const bReg = /^([^:]+:\/\/)([^@]+@)(\[[^\]]+\]|[^:?#\/]+)(:\d+)?([^#]*)(#.*)?$/;
            if (!bReg.test(baseLink)) { alert('原始格式不识别'); return; }

            const match = baseLink.match(bReg);
            const protocol = match[1], account = match[2], pathQ = match[5] || '';
            const regions = Array.from(document.querySelectorAll('#regionList input:checked')).map(cb => cb.value);
            let results = [];

            ipList.forEach((item, index) => {
                if (params.p) {
                    let nPQ = buildPathQuery(pathQ, { ed: params.ed, p: params.p, s: params.s, rm: params.rm });
                    const name = ipList.length > 1 ? `${params.flag} ${params.name}_${index + 1}` : `${params.flag} ${params.name}`;
                    results.push(`${protocol}${account}${item.host}${item.port}${nPQ}#${name}`);
                } else if (regions.length > 0) {
                    regions.forEach(r => {
                        let nPQ = buildPathQuery(pathQ, { ed: params.ed, wk: r, s: params.s, rm: params.rm });
                        results.push(`${protocol}${account}${item.host}${item.port}${nPQ}#${regionMap[r]}_⚡_ED-${r}`);
                    });
                } else {
                    let nPQ = buildPathQuery(pathQ, { ed: params.ed, s: params.s, rm: params.rm });
                    const name = ipList.length > 1 ? `${params.flag} ${params.name}_${index + 1}` : `${params.flag} ${params.name}`;
                    results.push(`${protocol}${account}${item.host}${item.port}${nPQ}#${name}`);
                }
            });
            output.value = results.join('\n');
            deduplicate('advOutput', true);
        }

        function buildPathQuery(base, u) {
            const clean = (s) => String(s || '').trim().replace(/\/+$/, "");
            let res = clean(base);
            const updates = {};
            if (u.ed) updates['ed'] = clean(u.ed);
            if (u.p) updates['p'] = clean(u.p);
            if (u.wk) updates['wk'] = clean(u.wk);
            if (u.s) updates['s'] = clean(u.s);
            if (u.rm) updates['rm'] = 'no';
            
            const merge = (b, upds) => {
                let parts = b.split('?'), pathPart = parts[0], queryPart = parts.slice(1).join('?');
                let map = {}, ord = [];
                (queryPart || '').split('&').forEach(pair => {
                    if (!pair) return;
                    let idx = pair.indexOf('=');
                    let k = idx > -1 ? pair.substring(0, idx) : pair;
                    let v = idx > -1 ? pair.substring(idx + 1) : '';
                    if (!map.hasOwnProperty(k)) ord.push(k);
                    map[k] = v;
                });
                for (let k in upds) { if (!map.hasOwnProperty(k)) ord.push(k); map[k] = upds[k]; }
                let newQ = ord.map(k => `${k}=${map[k]}`).join('&');
                return newQ ? `${pathPart}?${newQ}` : pathPart;
            };

            if (/path=/i.test(res)) {
                res = res.replace(/(path=)([^&]*)/i, (m, p1, p2) => {
                    let dP = clean(decodeURIComponent(p2));
                    if (!dP.startsWith('/')) dP = '/' + dP;
                    return p1 + encodeURIComponent(merge(dP, updates));
                });
            }
            return merge(res, updates).replace(/(\?|&|\/)+$/, '');
        }

        function copyResult(fid, bid) {
            const f = document.getElementById(fid), b = document.getElementById(bid);
            if (!f.value.trim()) return;
            f.select();
            navigator.clipboard.writeText(f.value).then(() => {
                const oldText = b.innerText; b.innerText = '✔️ 已复制';
                setTimeout(() => { b.innerText = oldText; }, 2000);
            });
        }

        function deduplicate(fid, silent = false) {
            const f = document.getElementById(fid);
            const lines = f.value.split('\n').map(l => l.trim()).filter(l => l !== '');
            const unique = [...new Set(lines)];
            f.value = unique.join('\n');
            if (!silent) alert(`清理了 ${lines.length - unique.length} 条`);
        }
    </script>
</body>
</html>
